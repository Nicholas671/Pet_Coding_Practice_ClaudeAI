<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sprite Exporter — Mythical Characters</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    body { background: #12100c; color: #c8c8c8; font-family: monospace; padding: 24px; }
    h1 { color: #c9a84c; }
    #grid { display: flex; flex-wrap: wrap; gap: 12px; margin: 24px 0; }
    .sprite-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .sprite-wrap span { font-size: 10px; color: #888; }
    canvas { image-rendering: pixelated; border: 1px solid #3a342a; }
    button { font-family: monospace; background: #8b1a1a; color: #e8d5b0; border: 1px solid #c9a84c;
             padding: 10px 24px; cursor: pointer; font-size: 1rem; border-radius: 3px; }
    button:hover { background: #b22222; }
    #status { color: #c9a84c; margin-top: 12px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>Sprite Exporter</h1>
  <p>All 36 sprites rendered below. Click <strong>Download All as ZIP</strong> to save them to a folder.</p>
  <button onclick="downloadAll()">Download All as ZIP</button>
  <p id="status"></p>
  <div id="grid"></div>

<script>
// ── Sprite drawing data (copied from spriteData.js) ──────────────────────────

const RACE_SKIN    = { Human:'#d4904a', Elf:'#c8b87a', Dwarf:'#b87840', Orc:'#587830', Halfling:'#c88040', Dragonborn:'#7a1808' };
const RACE_FEATURE = { Human:'#4a2808', Elf:'#d4b830', Dwarf:'#8a3808', Orc:'#101808', Halfling:'#5a3008', Dragonborn:'#580808' };
const RACE_EYES    = { Human:'#1a0a00', Elf:'#20a860', Dwarf:'#1a0a00', Orc:'#c01010', Halfling:'#1a0a00', Dragonborn:'#d08000' };

const CLASS_COLORS = {
  Warrior:     { primary:'#7a1818', secondary:'#505050', legs:'#383020' },
  Mage:        { primary:'#1830a0', secondary:'#483880', legs:'#201840' },
  Rogue:       { primary:'#201818', secondary:'#302818', legs:'#201818' },
  Paladin:     { primary:'#a0a0a0', secondary:'#c0a020', legs:'#606060' },
  Ranger:      { primary:'#2a5018', secondary:'#4a3010', legs:'#2a3818' },
  Necromancer: { primary:'#180828', secondary:'#380858', legs:'#100820' },
};
const CLASS_ACCENT = { Warrior:'#c0c0c0', Mage:'#60a8ff', Rogue:'#888060', Paladin:'#f0d060', Ranger:'#8a7040', Necromancer:'#60d080' };

const RACE_BODIES = {
  Human: (sk,ft,ey,cl) => [
    [13,1,6,2,ft],[13,3,6,5,sk],[14,5,1,1,ey],[17,5,1,1,ey],[15,8,2,1,sk],
    [12,9,8,7,cl.primary],[10,9,2,6,cl.secondary],[20,9,2,6,cl.secondary],
    [10,15,2,1,sk],[20,15,2,1,sk],[12,16,8,1,ft],
    [13,17,3,7,cl.legs],[16,17,3,7,cl.legs],[12,24,4,2,'#2a1808'],[16,24,4,2,'#2a1808'],
  ],
  Elf: (sk,ft,ey,cl) => [
    [13,0,6,3,ft],[12,2,1,6,ft],[19,2,1,6,ft],[14,3,5,5,sk],
    [13,5,1,2,sk],[13,4,1,1,sk],[19,5,1,2,sk],[19,4,1,1,sk],
    [15,5,1,1,ey],[18,5,1,1,ey],[15,8,2,1,sk],
    [13,9,6,8,cl.primary],[11,9,2,7,cl.secondary],[19,9,2,7,cl.secondary],
    [11,16,2,1,sk],[19,16,2,1,sk],[13,17,2,8,cl.legs],[17,17,2,8,cl.legs],
    [12,25,3,2,'#2a1808'],[17,25,3,2,'#2a1808'],
  ],
  Dwarf: (sk,ft,ey,cl) => [
    [11,3,10,2,ft],[12,5,8,6,sk],[14,7,1,1,ey],[17,7,1,1,ey],[12,9,8,4,ft],
    [11,13,10,6,cl.primary],[9,13,2,5,cl.secondary],[21,13,2,5,cl.secondary],
    [9,18,2,1,sk],[21,18,2,1,sk],[11,19,10,1,ft],
    [12,20,4,5,cl.legs],[16,20,4,5,cl.legs],[11,25,5,2,'#2a1808'],[16,25,5,2,'#2a1808'],
  ],
  Orc: (sk,ft,ey,cl) => [
    [15,1,2,2,ft],[12,2,8,7,sk],[13,4,2,1,ey],[17,4,2,1,ey],
    [14,8,1,3,'#e8e0c0'],[17,8,1,3,'#e8e0c0'],[14,9,4,2,sk],
    [10,11,12,8,cl.primary],[15,11,1,8,cl.secondary],[8,11,2,7,cl.secondary],[22,11,2,7,cl.secondary],
    [8,18,2,2,sk],[22,18,2,2,sk],[10,19,12,1,'#1a0a00'],
    [12,20,4,7,cl.legs],[16,20,4,7,cl.legs],[11,27,5,2,'#2a1808'],[16,27,5,2,'#2a1808'],
  ],
  Halfling: (sk,ft,ey,cl) => [
    [13,6,6,2,ft],[13,8,6,6,sk],[15,10,1,1,ey],[17,10,1,1,ey],
    [14,11,1,1,'#d07060'],[17,11,1,1,'#d07060'],[15,14,2,1,sk],
    [12,15,8,6,cl.primary],[10,15,2,5,cl.secondary],[20,15,2,5,cl.secondary],
    [10,20,2,1,sk],[20,20,2,1,sk],[13,21,3,4,cl.legs],[16,21,3,4,cl.legs],
    [11,23,5,1,ft],[11,24,5,2,sk],[16,23,5,1,ft],[16,24,5,2,sk],
  ],
  Dragonborn: (sk,ft,ey,cl) => [
    [13,0,2,4,ft],[17,0,2,4,ft],[13,4,6,5,sk],[14,4,1,1,ft],[17,4,1,1,ft],
    [14,5,1,1,ey],[18,5,1,1,ey],[14,7,4,3,sk],[15,9,2,1,ft],[14,9,4,2,sk],
    [12,11,8,8,cl.primary],[13,12,1,1,ft],[16,12,1,1,ft],[19,12,1,1,ft],[14,15,1,1,ft],[17,15,1,1,ft],
    [10,11,2,7,cl.secondary],[20,11,2,7,cl.secondary],
    [10,18,2,1,sk],[10,19,1,1,ft],[11,19,1,1,ft],[20,18,2,1,sk],[20,19,1,1,ft],[21,19,1,1,ft],
    [13,19,3,8,cl.legs],[16,19,3,8,cl.legs],[12,27,4,2,sk],[16,27,4,2,sk],
    [11,28,2,1,ft],[14,28,2,1,ft],[16,28,2,1,ft],[20,28,2,1,ft],
    [10,21,2,1,sk],[9,22,2,1,sk],[8,23,2,1,sk],[7,24,2,1,ft],
  ],
};

const CLASS_WEAPONS = {
  Warrior: (ac) => [[22,7,2,10,'#d0d0d0'],[20,12,5,1,ac],[22,13,2,4,'#8a5020'],[22,17,2,1,'#c8a020']],
  Mage: (ac) => [[23,5,1,20,'#7a5020'],[21,1,4,1,ac],[21,2,4,3,ac],[21,5,4,1,ac],[22,2,2,3,'#d0e8ff']],
  Rogue: (ac) => [[22,12,1,6,'#c0c0b0'],[21,17,2,1,'#8a5020'],[22,18,1,1,ac],[9,12,1,6,'#c0c0b0'],[9,17,2,1,'#8a5020'],[9,18,1,1,ac]],
  Paladin: (ac) => [[7,10,3,7,'#b0b0b0'],[7,10,3,1,ac],[7,16,3,1,ac],[7,10,1,7,ac],[9,10,1,7,ac],[8,11,1,5,ac],[7,13,3,1,ac],[22,7,2,10,'#e0e0f0'],[20,12,5,1,ac],[22,13,2,4,'#8a5020']],
  Ranger: (ac) => [[23,5,1,14,ac],[22,5,1,1,ac],[22,18,1,1,ac],[24,6,1,12,'#e8e0c0'],[21,11,2,1,'#c04020'],[22,11,1,7,'#c8a030'],[22,18,1,1,'#808060']],
  Necromancer: (ac) => [[23,6,1,20,'#3a1848'],[21,2,4,1,'#d0cdb0'],[21,3,4,3,'#d0cdb0'],[21,6,4,1,'#d0cdb0'],[22,4,1,1,'#200030'],[23,4,1,1,'#200030'],[22,6,1,1,'#200030'],[21,2,1,5,ac],[24,2,1,5,ac]],
};

function drawRect(ctx, x, y, w, h, color, scale) {
  ctx.fillStyle = color;
  ctx.fillRect(x*scale, y*scale, w*scale, h*scale);
}

function drawSprite(ctx, race, cls, scale) {
  drawRect(ctx,0,0,32,32,'#12100c',scale);
  drawRect(ctx,0,28,32,1,'#2a2418',scale);
  drawRect(ctx,0,29,32,3,'#1a1810',scale);
  const sk=RACE_SKIN[race], ft=RACE_FEATURE[race], ey=RACE_EYES[race];
  const cl=CLASS_COLORS[cls], ac=CLASS_ACCENT[cls];
  for(const [x,y,w,h,c] of (RACE_BODIES[race]?.(sk,ft,ey,cl)??[])) drawRect(ctx,x,y,w,h,c,scale);
  for(const [x,y,w,h,c] of (CLASS_WEAPONS[cls]?.(ac)??[])) drawRect(ctx,x,y,w,h,c,scale);
}

// ── Render all 36 sprites ────────────────────────────────────────────────────

const RACES   = ['Human','Elf','Dwarf','Orc','Halfling','Dragonborn'];
const CLASSES = ['Warrior','Mage','Rogue','Paladin','Ranger','Necromancer'];
const SCALE   = 4; // 128px preview (32 * 4)

const canvases = {};
const grid = document.getElementById('grid');

for (const race of RACES) {
  for (const cls of CLASSES) {
    const key = `${race}_${cls}`;
    const wrap = document.createElement('div');
    wrap.className = 'sprite-wrap';

    const canvas = document.createElement('canvas');
    canvas.width  = 32 * SCALE;
    canvas.height = 32 * SCALE;
    canvas.style.width  = 32 * SCALE + 'px';
    canvas.style.height = 32 * SCALE + 'px';
    canvas.title = key;

    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    drawSprite(ctx, race, cls, SCALE);

    const label = document.createElement('span');
    label.textContent = `${race} ${cls}`;

    wrap.appendChild(canvas);
    wrap.appendChild(label);
    grid.appendChild(wrap);
    canvases[key] = canvas;
  }
}

// ── ZIP download ─────────────────────────────────────────────────────────────

async function downloadAll() {
  const status = document.getElementById('status');
  status.textContent = 'Building ZIP...';

  const zip = new JSZip();
  const folder = zip.folder('sprites');

  for (const [key, canvas] of Object.entries(canvases)) {
    // Export each canvas at 1x (32px) for clean pixel art files
    const exportCanvas = document.createElement('canvas');
    exportCanvas.width  = 32;
    exportCanvas.height = 32;
    const ctx = exportCanvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    const [race, cls] = key.split('_');
    drawSprite(ctx, race, cls, 1);

    const dataUrl = exportCanvas.toDataURL('image/png');
    const base64  = dataUrl.split(',')[1];
    folder.file(`${key}.png`, base64, { base64: true });
  }

  const blob = await zip.generateAsync({ type: 'blob' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'sprites.zip';
  link.click();
  status.textContent = '✓ sprites.zip downloaded — extract it into your project folder.';
}
</script>
</body>
</html>
